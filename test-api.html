<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Diagnostic - Smart Construction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin: 5px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }
        .test-section h3 {
            margin-bottom: 15px;
            color: #333;
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
        }
        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .result pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .loading {
            text-align: center;
            color: #667eea;
            padding: 20px;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        .status-badge.ok {
            background: #d4edda;
            color: #155724;
        }
        .status-badge.fail {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 API Diagnostic Tool</h1>
        <p class="subtitle">Smart Construction Management System - Railway Backend</p>
        
        <div style="margin-bottom: 20px;">
            <button class="btn" onclick="runAllTests()">🚀 Run All Tests</button>
            <button class="btn" onclick="clearResults()">🗑️ Clear Results</button>
        </div>

        <div id="test-results"></div>
    </div>

    <script>
        const API_URL = 'https://smart-construction-management-system-production.up.railway.app/api';
        let authToken = null;

        const tests = [
            {
                name: '1. Health Check',
                endpoint: '/health',
                method: 'GET',
                requiresAuth: false
            },
            {
                name: '2. Admin Login',
                endpoint: '/auth/login',
                method: 'POST',
                requiresAuth: false,
                body: { email: 'admin@khazabilkis.com', password: 'admin123' }
            },
            {
                name: '3. Get User Stats',
                endpoint: '/auth/all-user-stats',
                method: 'GET',
                requiresAuth: true
            },
            {
                name: '4. Get Dashboard Stats',
                endpoint: '/reports/dashboard',
                method: 'GET',
                requiresAuth: true
            },
            {
                name: '5. Get Projects',
                endpoint: '/projects',
                method: 'GET',
                requiresAuth: true
            },
            {
                name: '6. Get Employees',
                endpoint: '/employees',
                method: 'GET',
                requiresAuth: true
            },
            {
                name: '7. Get Vouchers',
                endpoint: '/vouchers',
                method: 'GET',
                requiresAuth: true
            }
        ];

        async function runTest(test) {
            const resultDiv = document.getElementById(`result-${test.endpoint.replace(/\//g, '-')}`);
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Testing...</div>';

            try {
                const headers = {
                    'Content-Type': 'application/json'
                };

                if (test.requiresAuth && authToken) {
                    headers['Authorization'] = `Bearer ${authToken}`;
                }

                const options = {
                    method: test.method,
                    headers
                };

                if (test.body) {
                    options.body = JSON.stringify(test.body);
                }

                const response = await fetch(`${API_URL}${test.endpoint}`, options);
                const data = await response.json();

                // Save token if login successful
                if (test.endpoint === '/auth/login' && data.success) {
                    authToken = data.data.token;
                }

                resultDiv.className = 'result success';
                resultDiv.innerHTML = `
                    <strong>✅ SUCCESS (${response.status})</strong>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <strong>❌ ERROR</strong>
                    <pre>${error.message}</pre>
                `;
            }
        }

        async function runAllTests() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '';

            for (const test of tests) {
                const section = document.createElement('div');
                section.className = 'test-section';
                section.innerHTML = `
                    <h3>${test.name}</h3>
                    <button class="btn" onclick='runTest(${JSON.stringify(test)})'>Test</button>
                    <div id="result-${test.endpoint.replace(/\//g, '-')}"></div>
                `;
                resultsDiv.appendChild(section);

                // Auto-run each test with delay
                await new Promise(resolve => setTimeout(resolve, 500));
                await runTest(test);
            }
        }

        function clearResults() {
            document.getElementById('test-results').innerHTML = '';
        }

        // Auto-run on load
        window.addEventListener('load', () => {
            setTimeout(runAllTests, 1000);
        });
    </script>
</body>
</html>
